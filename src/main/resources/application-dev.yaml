spring:
  application:
    name: ERP
  datasource:
    url: jdbc:postgresql://${GZOULI_DB_HOST}:${GZOULI_DB_PORT}/${GZOULI_DB_NAME}
    username: ${GZOULI_DB_USER}
    password: ${GZOULI_DB_PASSWORD}
#    url: jdbc:postgresql://localhost:5433/gzouli_dbname
#    username: simple_user
#    password: password123
    driver-class-name: org.postgresql.Driver
  jpa:
    # CORRECTION ICI : Le nom correct du dialecte (ou supprimez cette ligne, Spring le devine souvent seul)
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    # Optionnel : Pour voir les requêtes SQL dans la console (utile en dev)
  security:
    oauth2:
          resourceserver:
            jwt:
              # Attention à l'indentation !
              issuer-uri: https://cognito-idp.${AWS_REGION}.amazonaws.com/${AWS_COGNITO_USER_POOL_ID}

#    show-sql: true
#    properties:
#      hibernate:
#        format_sql: true

aws:
  accessKeyId: ${AWS_ACCESS_KEY_ID}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
  region: ${AWS_REGION}
  cognito:
    userPoolId: ${AWS_COGNITO_USER_POOL_ID}

server:
  port: 8080
