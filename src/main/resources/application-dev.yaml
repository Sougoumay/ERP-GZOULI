spring:
  application:
    name: ERP
  datasource:
    # CORRECTION ICI : jdbc:postgresql au lieu de jdbc:mysql
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    # CORRECTION ICI : Le nom correct du dialecte (ou supprimez cette ligne, Spring le devine souvent seul)
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    # Optionnel : Pour voir les requêtes SQL dans la console (utile en dev)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080