services:
  application:
    build:
      context: .
    container_name: erp-container
    ports:
      - "8080:8080"
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${GZOULI_DB_USER}
      - DB_PASSWORD=${GZOULI_DB_PASSWORD}
      - DB_NAME=${GZOULI_DB_NAME}
      - SPRING_PROFILES_ACTIVE=docker
      - AWS_REGION=${AWS_REGION}
      - AWS_PROFILE=gzouli-local
      - AWS_COGNITO_USER_POOL_ID=${AWS_COGNITO_USER_POOL_ID}
      - AWS_COGNITO_APP_CLIENT_ID=${AWS_COGNITO_APP_CLIENT_ID}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - NVD_API_KEY=${NVD_API_KEY}
    volumes:
      - $HOME/.aws:/root/.aws:ro
    depends_on:
      db :
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      retries: 5
      start_period: 20s
    networks:
      - gzouli_erp

  db:
    image: postgres:16
    container_name: bdd-container
    restart: always
    environment:
      POSTGRES_DB: ${GZOULI_DB_NAME}
      POSTGRES_USER: ${GZOULI_DB_USER}
      POSTGRES_PASSWORD: ${GZOULI_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${GZOULI_DB_USER} -d ${GZOULI_DB_NAME}" ]
      interval: 10s
      retries: 5
      start_period: 20s
      timeout: 5s
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - gzouli_erp

volumes:
  db-data:

networks:
  gzouli_erp:
    driver: bridge
