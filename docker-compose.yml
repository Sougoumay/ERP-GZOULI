services:
  application:
    build:
      context: .
    container_name: erp-container
    ports:
      - "8080:8080"
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      db :
        condition: service_healthy
    networks:
      - gzouli_erp

  db:
    image: postgres:16
    container_name: bdd-container
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      retries: 5
      start_period: 20s
      timeout: 5s
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - gzouli_erp
volumes:
  db-data:

networks:
  gzouli_erp:
    driver: bridge