name: Terraform CI

on:
  push:
    branches: [infra]
    paths: [terraform/**]
  pull_request:
    branches: [infra]
    paths: [terraform/**]

env:
  AWS_REGION: eu-west-3
  TF_WORKSPACE: prod
  TF_DIR: terraform

# ─────────────────────────────────────────────────────────────
# JOB 1 — Lint
# Vérifie le formatage sans credentials AWS ni terraform init.
# Rapide — bloque tôt si le code n'est pas formaté.
# ─────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Plan
  # Init + validate + plan. Poste le plan en commentaire sur la PR
  # pour review avant merge. Sauvegarde le tfplan compilé pour
  # que le job apply puisse l'utiliser directement sans re-planifier.
  # ─────────────────────────────────────────────────────────────
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Commenter le plan sur la PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (tronqué — voir les logs du workflow)'
              : plan;
            const body = `## Terraform Plan — workspace \`${{ env.TF_WORKSPACE }}\`
            \`\`\`hcl
            ${truncated}
            \`\`\`
            *Commit: \`${{ github.sha }}\` | [Voir les logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Échouer si le plan a échoué
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Apply
  # Uniquement sur push dans infra (jamais sur PR).
  # Bloqué par l'approbation manuelle via GitHub Environment
  # "production" — configure les reviewers dans Settings → Environments.
  # ─────────────────────────────────────────────────────────────
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/infra'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false
