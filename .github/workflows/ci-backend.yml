name: Backend — Build, Scan & Push

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: gzouli-ecr-repository
  IMAGE_LOCAL_TAG: gzouli-backend:${{ github.sha }}
  ECS_CLUSTER: gzouli-ecs-cluster
  ECS_SERVICE: gzouli-service

# ─────────────────────────────────────────────────────────────
# JOB 1 — Build
# Construit l'image et la sauvegarde en tar pour les jobs suivants.
# Pas de push à ce stade — Trivy doit valider en premier.
# ─────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_LOCAL_TAG }} \
            ./backend

      - name: Sauvegarder l'image en tar
        run: docker save ${{ env.IMAGE_LOCAL_TAG }} -o image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Scan Trivy
  # Bloque le pipeline sur toute vulnérabilité CRITICAL ou HIGH
  # non corrigée. Les résultats sont aussi visibles dans
  # Security → Code scanning de GitHub.
  # ─────────────────────────────────────────────────────────────
  scan:
    name: Scan Trivy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image Docker
        run: docker load -i image.tar

      - name: Scan Trivy — CRITICAL et HIGH
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_LOCAL_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Push ECR
  # S'exécute uniquement sur merge dans main (pas sur les PRs).
  # Pousse avec le SHA du commit et le tag latest.
  # ─────────────────────────────────────────────────────────────
  push:
    name: Push ECR
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image Docker
        run: docker load -i image.tar

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tagger et pousser vers ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${{ env.IMAGE_LOCAL_TAG }} $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_LOCAL_TAG }} $REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:latest

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Deploy ECS
  # Force un redéploiement du service ECS après le push ECR.
  # ECS arrête les anciennes tasks et démarre des nouvelles avec
  # l'image :latest qui vient d'être poussée.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ECS
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --no-cli-pager

      - name: Attendre que le service soit stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
