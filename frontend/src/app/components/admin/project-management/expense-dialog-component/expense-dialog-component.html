<h2 mat-dialog-title>Nouvelle Dépense / Charge</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="expense-form">

    <!-- Ligne 1 : Type & Date -->
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Type de Charge</mat-label>
        <mat-select formControlName="type">
          <mat-option *ngFor="let type of expenseTypes" [value]="type">
            {{ type }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="expenseDate">
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- Ligne 2 : Libellé -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description (Ex: Vidange Ford)</mat-label>
      <input matInput formControlName="label">
    </mat-form-field>

    <!-- Ligne 3 : Montant & Employé -->
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Montant TTC (DH)</mat-label>
        <input matInput type="number" formControlName="amount">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Effectuée par</mat-label>
        <mat-select formControlName="employeeId">
          <mat-option *ngFor="let emp of employees" [value]="emp.id">
            {{ emp.firstName }} {{ emp.lastName }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Zone Upload (Style Identique Factures) -->
    <div class="file-upload-area">
      <label for="expenseFileUpload" class="upload-btn">
        <mat-icon>receipt_long</mat-icon>
        {{ selectedFile ? selectedFile.name : 'Scanner le ticket/reçu (PDF)' }}
      </label>
      <input type="file" id="expenseFileUpload" (change)="onFileSelected($event)" accept="application/pdf" hidden>
      <div *ngIf="!selectedFile && form.touched" class="error-text">Le justificatif est obligatoire.</div>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <!-- On désactive aussi le bouton d'annulation pendant l'envoi pour éviter une fermeture prématurée -->
  <button mat-button mat-dialog-close [disabled]="isSubmitting">Annuler</button>

  <!-- Intégration du Spinner avec gestion de l'état isSubmitting -->
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid || isSubmitting">
    <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
      <!-- Le spinner s'affiche uniquement si isSubmitting est true -->
      <mat-spinner *ngIf="isSubmitting" diameter="20" color="accent"></mat-spinner>

      <!-- Changement de texte dynamique -->
      <span *ngIf="isSubmitting">Traitement...</span>
      <span *ngIf="!isSubmitting">Enregistrer</span>
    </div>
  </button>
<!--  <button mat-button mat-dialog-close>Annuler</button>-->
<!--  <button mat-flat-button color="warn" (click)="onSubmit()" [disabled]="form.invalid || !selectedFile || isSubmitting">-->
<!--    {{ isSubmitting ? 'Envoi...' : 'Enregistrer Dépense' }}-->
<!--  </button>-->
</mat-dialog-actions>
