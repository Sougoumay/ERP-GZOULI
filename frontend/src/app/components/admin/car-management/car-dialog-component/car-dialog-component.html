<h2 mat-dialog-title>{{ isEditMode ? 'Modifier Véhicule' : 'Nouveau Véhicule' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form">

    <div style="display: flex; gap: 15px;">
      <!-- Marque -->
      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>Marque</mat-label>
        <input matInput formControlName="brand" placeholder="Ex: Dacia">
      </mat-form-field>

      <!-- Modèle -->
      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>Modèle</mat-label>
        <input matInput formControlName="model" placeholder="Ex: Logan">
      </mat-form-field>
    </div>

    <!-- Matricule -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Immatriculation (Matricule)</mat-label>
      <input matInput formControlName="registrationNumber" placeholder="Ex: 12345-A-6">
    </mat-form-field>

    <!-- Coût Mensuel -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Coût Mensuel (Crédit/Leasing)</mat-label>
      <input matInput type="number" formControlName="monthlyCost">
      <span matTextSuffix>DH</span>
      <mat-hint>Charge fixe utilisée pour le calcul de rentabilité</mat-hint>
    </mat-form-field>

    <!-- État -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>État du véhicule</mat-label>
      <mat-select formControlName="state">
        <mat-option value="EN_SERVICE">En Service (Bon état)</mat-option>
        <mat-option value="EN_PANNE">En Panne / Garage</mat-option>
        <mat-option value="VENDU">Vendu / Sorti du parc</mat-option>
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Annuler</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">
    {{ isEditMode ? 'Mettre à jour' : 'Enregistrer' }}
  </button>
</mat-dialog-actions>
